body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;padding:1.5rem;color:#1a1a1a}
.setup{padding:1.5rem;background:#fff;border-radius:12px;border:1px solid #e0e0e0;margin-bottom:1rem;max-width:700px;margin-left:auto;margin-right:auto}
.setup h2{font-size:16px;font-weight:600;margin-bottom:1rem}
.row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:160px}
.field label{font-size:12px;color:#666}
.field input{height:36px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#1a1a1a;padding:0 10px;font-size:14px}
.field input:focus{outline:none;border-color:#888}
.btn-start{background:#1a1a1a;color:#fff;border:none;border-radius:8px;padding:0 20px;height:36px;font-size:14px;font-weight:500;cursor:pointer}
.btn-start:hover{opacity:0.85}
.tracker{display:none;max-width:700px;margin:0 auto}
.deal-header{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.deal-addr{font-size:16px;font-weight:600;color:#1a1a1a}
.deal-sub{font-size:12px;color:#666;margin-top:2px}
.stats{display:flex;gap:10px;flex-wrap:wrap}
.stat{background:#f5f5f5;border-radius:8px;padding:8px 14px;text-align:center}
.stat-n{font-size:20px;font-weight:600;color:#1a1a1a}
.stat-l{font-size:11px;color:#666;margin-top:1px}
.phase-block{margin-bottom:1rem}
.phase-head{display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:8px;margin-bottom:6px;user-select:none}
.phase-head .ph-title{font-size:13px;font-weight:600;flex:1}
.phase-head .ph-count{font-size:12px;opacity:0.8}

.add-task-input:focus{outline:none;border-color:#888}

.step-footer{display:flex;align-items:center;gap:8px;margin-top:10px}

.modal{background:#fff;border-radius:14px;padding:1.5rem;width:90%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,0.18)}

.modal-input:focus{outline:none;border-color:#888}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.modal-btn{border:none;border-radius:8px;padding:6px 16px;font-size:13px;font-weight:500;cursor:pointer}
.modal-btn.primary{background:#1a1a1a;color:#fff}
.modal-btn.danger{background:#c0392b;color:#fff}
.modal-btn.secondary{background:#f0f0f0;color:#333}

<h1>Listing Marketing Tracker</h1>

<!-- SAVED PROPERTIES -->
<div class="saved-section" id="saved-section" style="display:none">
  <h3>📂 Saved listings — tap to continue</h3>
  <div class="saved-list" id="saved-list"></div>
</div>

<div class="setup" id="setup-panel">
  <h2>New listing setup</h2>
  <div class="row">
    <div class="field">
      <label>Property address</label>
      <input type="text" id="inp-addr" placeholder="123 Main St, Louisville KY" />
    </div>
    <div class="field" style="max-width:180px">
      <label>Listing date</label>
      <input type="date" id="inp-date" />
    </div>
  </div>
  <button class="btn-start" onclick="startDeal()">Start listing tracker</button>
</div>

<div class="tracker" id="tracker-panel">
  <div class="deal-header">
    <div>
      <div class="deal-addr" id="disp-addr"></div>
      <div class="deal-sub" id="disp-sub"></div>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-n" id="st-done">0</div><div class="stat-l">Completed</div></div>
      <div class="stat"><div class="stat-n" id="st-left">0</div><div class="stat-l">Remaining</div></div>
      <div class="stat"><div class="stat-n" id="st-urgent">0</div><div class="stat-l">This Week</div></div>
    </div>
    <button class="reset-btn" onclick="resetDeal()">← All listings</button>
  </div>

  <!-- TOP ACTION BAR -->
  <div class="top-action-bar">
    <button class="btn-save-progress" onclick="saveProgress()">💾 Save progress</button>
    <button class="btn-download" onclick="downloadPDF()">⬇ Download PDF report</button>
    <button class="btn-download" onclick="downloadCSV()">⬇ Download CSV</button>
    <span class="save-indicator" id="save-indicator"></span>
  </div>

  <div id="current-week-banner" class="current-week-banner"></div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all',this)">All weeks</button>
    <button class="filter-btn" onclick="setFilter('current',this)">This week</button>
    <button class="filter-btn" onclick="setFilter('pending',this)">Pending</button>
    <button class="filter-btn" onclick="setFilter('done',this)">Completed</button>
  </div>

  <div id="phases-container"></div>
</div>

<!-- Confirm delete modal -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <h3>Delete task?</h3>
    <p id="delete-modal-text"></p>
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="closeModal('delete-modal')">Cancel</button>
      <button class="modal-btn danger" id="delete-confirm-btn">Delete</button>
    </div>
  </div>
</div>

<!-- Replace task modal -->
<div class="modal-overlay" id="replace-modal">
  <div class="modal">
    <h3>Replace task</h3>
    <p id="replace-modal-old" style="font-size:12px;color:#888;margin-bottom:10px;font-style:italic"></p>
    <input class="modal-input" id="replace-modal-input" placeholder="New task text..." />
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="closeModal('replace-modal')">Cancel</button>
      <button class="modal-btn primary" id="replace-confirm-btn">Replace</button>
    </div>
  </div>
</div>

  const key = currentListingKey || (listingAddr + '_' + listingDate.toISOString().split('T')[0]);
  currentListingKey = key;
  const all = getAllListings();
  const totalDone = Object.values(stepStatus).filter(v=>v==='done').length;
  const totalChecked = Object.values(state).filter(Boolean).length;
  all[key] = {
    addr: listingAddr,
    date: listingDate.toISOString(),
    state: state,
    stepStatus: stepStatus,
    STEPS: STEPS,
    savedAt: new Date().toISOString(),
    totalDone,
    totalChecked
  };
  saveAllListings(all);
  const ind = document.getElementById('save-indicator');
  ind.textContent = '✓ Saved ' + new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  setTimeout(()=>{ ind.textContent=''; }, 3000);
  renderSavedList();
}

function loadListing(key){
  const all = getAllListings();
  const rec = all[key];
  if(!rec) return;
  currentListingKey = key;
  listingAddr = rec.addr;
  listingDate = new Date(rec.date);
  state = rec.state || {};
  stepStatus = rec.stepStatus || {};
  STEPS = rec.STEPS ? JSON.parse(JSON.stringify(rec.STEPS)) : JSON.parse(JSON.stringify(STEPS_DEFAULT));
  document.getElementById('disp-addr').textContent = listingAddr;
  document.getElementById('disp-sub').textContent = 'Listed: ' + listingDate.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  document.getElementById('setup-panel').style.display = 'none';
  document.getElementById('saved-section').style.display = 'none';
  document.getElementById('tracker-panel').style.display = 'block';
  renderAll();
}

function deleteListing(key, e){
  e.stopPropagation();
  if(!confirm('Delete this saved listing?')) return;
  const all = getAllListings();
  delete all[key];
  saveAllListings(all);
  renderSavedList();
}

function renderSavedList(){
  const all = getAllListings();
  const keys = Object.keys(all);
  const section = document.getElementById('saved-section');
  const list = document.getElementById('saved-list');
  if(keys.length === 0){ section.style.display = 'none'; return; }
  section.style.display = 'block';
  list.innerHTML = keys.map(k => {
    const r = all[k];
    const saved = r.savedAt ? new Date(r.savedAt).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';
    const allSteps = [];
    (r.STEPS||STEPS_DEFAULT).forEach(ph=>ph.steps.forEach(s=>allSteps.push(s)));
    const total = allSteps.length;
    const done = Object.values(r.stepStatus||{}).filter(v=>v==='done').length;
    const pct = total > 0 ? Math.round((done/total)*100) : 0;
    return `<div class="saved-item" onclick="loadListing('${k.replace(/'/g,"\\'")}')">
      <div>
        <div class="saved-item-addr">${r.addr}</div>
        <div class="saved-item-meta">Listed ${new Date(r.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})} · Saved ${saved}</div>
      </div>
      <div class="saved-progress">${pct}% done</div>
      <button class="saved-item-del" onclick="deleteListing('${k.replace(/'/g,"\\'")}',event)" title="Delete">✕</button>
    </div>`;
  }).join('');
}

// ── Deal lifecycle ─────────────────────────────────────────────────────────────
function startDeal(){
  const addr = document.getElementById('inp-addr').value.trim();
  const dateVal = document.getElementById('inp-date').value;
  if(!addr || !dateVal){alert('Please enter address and listing date');return;}
  listingAddr = addr;
  listingDate = new Date(dateVal + 'T00:00:00');
  currentListingKey = addr + '_' + dateVal;
  state = {};
  stepStatus = {};
  STEPS = JSON.parse(JSON.stringify(STEPS_DEFAULT));
  document.getElementById('disp-addr').textContent = addr;
  document.getElementById('disp-sub').textContent = 'Listed: ' + listingDate.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  document.getElementById('setup-panel').style.display='none';
  document.getElementById('saved-section').style.display='none';
  document.getElementById('tracker-panel').style.display='block';
  saveProgress();
  renderAll();
}

function resetDeal(){
  saveProgress();
  document.getElementById('setup-panel').style.display='block';
  document.getElementById('tracker-panel').style.display='none';
  document.getElementById('inp-addr').value='';
  currentListingKey = null;
  renderSavedList();
}

// ── Week/due helpers ──────────────────────────────────────────────────────────
function getDaysOnMarket(){
  const now = new Date();
  return Math.floor((now - listingDate) / 86400000);
}

function getCurrentWeekNum(){
  const dom = getDaysOnMarket();
  if(dom < 1) return 0; // on deck
  return Math.ceil(dom / 7);
}

function getDueInfo(step){
  if(stepStatus[step.n]==='done') return {label:'Done', cls:'due-done'};
  const dom = getDaysOnMarket();

  // On Deck special case
  if(step.deadlineStart === 0 && step.deadlineEnd === 0){
    if(dom < 0) return {label:'Upcoming', cls:'due-upcoming'};
    if(dom === 0) return {label:'Do today', cls:'due-urgent'};
    return {label:'Overdue', cls:'due-urgent'};
  }

  if(dom < step.deadlineStart){
    // Upcoming — how many days until window opens
    const daysUntil = step.deadlineStart - dom;
    if(daysUntil <= 3) return {label:'In '+daysUntil+'d', cls:'due-soon'};
    return {label:'Week '+ Math.ceil(step.deadlineStart/7), cls:'due-upcoming'};
  }
  if(dom >= step.deadlineStart && dom <= step.deadlineEnd){
    const daysLeft = step.deadlineEnd - dom;
    if(daysLeft === 0) return {label:'Last day', cls:'due-urgent'};
    if(daysLeft <= 2) return {label:daysLeft+'d left', cls:'due-urgent'};
    return {label:'This week', cls:'due-ok'};
  }
  // Past window
  return {label:'Overdue', cls:'due-urgent'};
}

function isCurrentWeek(step){
  if(stepStatus[step.n]==='done') return false;
  const dom = getDaysOnMarket();
  if(step.deadlineStart === 0 && step.deadlineEnd === 0) return dom >= 0 && dom <= 1;
  return dom >= step.deadlineStart && dom <= step.deadlineEnd;
}

// ── Checkbox ──────────────────────────────────────────────────────────────────
function toggleItem(stepN, idx){
  state[stepN+'-'+idx] = !state[stepN+'-'+idx];
  saveProgress();
  renderAll();
}

function markDone(stepN){
  stepStatus[stepN] = stepStatus[stepN]==='done' ? '' : 'done';
  saveProgress();
  renderAll();
}

function setFilter(f, btn){
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderAll(){
  const container = document.getElementById('phases-container');
  let totalDone=0, totalLeft=0, totalThisWeek=0;
  let allSteps = [];
  STEPS.forEach(ph=>ph.steps.forEach(s=>allSteps.push(s)));

  allSteps.forEach(s=>{
    if(stepStatus[s.n]==='done') totalDone++;
    else {
      totalLeft++;
      if(isCurrentWeek(s)) totalThisWeek++;
    }
  });
  document.getElementById('st-done').textContent=totalDone;
  document.getElementById('st-left').textContent=totalLeft;
  document.getElementById('st-urgent').textContent=totalThisWeek;

  // Current week banner
  const dom = getDaysOnMarket();
  const weekNum = getCurrentWeekNum();
  const banner = document.getElementById('current-week-banner');
  if(dom < 0){
    banner.textContent = 'Listing goes live in '+Math.abs(dom)+' day(s) — complete On Deck tasks now';
  } else if(dom === 0){
    banner.textContent = '🚀 Listing day! Complete On Deck tasks and kick off Week 1';
  } else {
    banner.textContent = '📅 Day '+dom+' on market · Currently in Week '+weekNum;
  }

  let html='';
  STEPS.forEach(ph=>{
    const phSteps = ph.steps.filter(s=>{
      if(currentFilter==='done') return stepStatus[s.n]==='done';
      if(currentFilter==='pending') return stepStatus[s.n]!=='done';
      if(currentFilter==='current') return isCurrentWeek(s) && stepStatus[s.n]!=='done';
      return true;
    });
    if(phSteps.length===0) return;

    const phaseDone = ph.steps.filter(s=>stepStatus[s.n]==='done').length;
    html+=`<div class="phase-block">
      <div class="phase-head ph-${ph.phase}">
        <span class="ph-title">${ph.phaseLabel}</span>
        <span class="ph-count">${phaseDone}/${ph.steps.length}</span>
      </div>`;

    phSteps.forEach(s=>{
      const di = getDueInfo(s);
      const isDone = stepStatus[s.n]==='done';
      const itemsDone = s.items.filter((_,i)=>state[s.n+'-'+i]).length;
      html+=`<div class="step-card">
        <div class="step-head" onclick="toggleStep(${s.n})">
          <span class="step-title">${escHtml(s.title)}</span>
          <span style="font-size:11px;color:#999;margin-right:8px">${itemsDone}/${s.items.length}</span>
          <span class="due-badge ${di.cls}">${di.label}</span>
        </div>
        <div class="step-body" id="step-body-${s.n}" style="display:none">
          <div class="items-list" id="items-list-${s.n}">`;

      s.items.forEach((item,i)=>{
        const key = s.n+'-'+i;
        const checked = state[key] ? 'checked' : '';
        const doneClass = state[key] ? ' done' : '';
        const isEditing = editingItem && editingItem.stepN===s.n && editingItem.idx===i;

        if(isEditing){
          html+=`<div class="item-edit-row">
            <input class="item-edit-input" id="edit-input-${s.n}-${i}" value="${escAttr(item)}" onkeydown="editKeydown(event,${s.n},${i})">
            <button class="item-edit-save" onclick="saveEdit(${s.n},${i})">Save</button>
            <button class="item-edit-cancel" onclick="cancelEdit()">Cancel</button>
          </div>`;
        } else {
          html+=`<div class="item-row">
            <input type="checkbox" class="item-cb" ${checked} onchange="toggleItem(${s.n},${i})">
            <span class="item-label${doneClass}">${escHtml(item)}</span>
            <div class="item-actions">
              <button class="item-action-btn" title="Edit task" onclick="startEdit(${s.n},${i})">✏️</button>
              <button class="item-action-btn" title="Replace task" onclick="openReplaceModal(${s.n},${i})">🔄</button>
              <button class="item-action-btn del" title="Delete task" onclick="openDeleteModal(${s.n},${i})">🗑</button>
            </div>
          </div>`;
        }
      });

      html+=`</div>
          <div class="add-task-row">
            <input class="add-task-input" id="add-input-${s.n}" placeholder="Add a new task…" onkeydown="addTaskKeydown(event,${s.n})">
            <button class="add-task-btn" onclick="addTask(${s.n})">+ Add task</button>
          </div>
          <div class="step-footer">
            <button class="mark-done-btn${isDone?' completed':''}" onclick="markDone(${s.n})">${isDone?'✓ Completed':'Mark week done'}</button>
          </div>
        </div>
      </div>`;
    });
    html+='</div>';
  });
  container.innerHTML=html;

  if(editingItem){
    const el = document.getElementById(`edit-input-${editingItem.stepN}-${editingItem.idx}`);
    if(el){ el.focus(); el.select(); }
  }
}

function toggleStep(n){
  const body = document.getElementById('step-body-'+n);
  if(body) body.style.display = body.style.display==='none' ? 'block' : 'none';
}

// ── Inline edit ───────────────────────────────────────────────────────────────
function startEdit(stepN, idx){
  editingItem = {stepN, idx};
  renderAll();
  const b = document.getElementById('step-body-'+stepN);
  if(b) b.style.display='block';
}

function saveEdit(stepN, idx){
  const input = document.getElementById(`edit-input-${stepN}-${idx}`);
  const val = input ? input.value.trim() : '';
  if(!val){ alert('Task cannot be empty.'); return; }
  const step = findStep(stepN);
  if(step) step.items[idx] = val;
  editingItem = null;
  renderAll();
  const b = document.getElementById('step-body-'+stepN);
  if(b) b.style.display='block';
}

function cancelEdit(){
  const sn = editingItem ? editingItem.stepN : null;
  editingItem = null;
  renderAll();
  if(sn){ const b = document.getElementById('step-body-'+sn); if(b) b.style.display='block'; }
}

function editKeydown(e, stepN, idx){
  if(e.key==='Enter'){ e.preventDefault(); saveEdit(stepN,idx); }
  if(e.key==='Escape'){ e.preventDefault(); cancelEdit(); }
}

// ── Add task ──────────────────────────────────────────────────────────────────
function addTask(stepN){
  const input = document.getElementById('add-input-'+stepN);
  const val = input ? input.value.trim() : '';
  if(!val) return;
  const step = findStep(stepN);
  if(step) step.items.push(val);
  renderAll();
  const b = document.getElementById('step-body-'+stepN);
  if(b) b.style.display='block';
  const ni = document.getElementById('add-input-'+stepN);
  if(ni) ni.focus();
}

function addTaskKeydown(e, stepN){
  if(e.key==='Enter'){ e.preventDefault(); addTask(stepN); }
}

// ── Delete ────────────────────────────────────────────────────────────────────
let pendingDelete = null;

function openDeleteModal(stepN, idx){
  const step = findStep(stepN);
  const text = step ? step.items[idx] : '';
  document.getElementById('delete-modal-text').textContent = `Delete: "${text}"`;
  pendingDelete = {stepN, idx};
  document.getElementById('delete-confirm-btn').onclick = confirmDelete;
  openModal('delete-modal');
}

function confirmDelete(){
  if(!pendingDelete) return;
  const {stepN, idx} = pendingDelete;
  const step = findStep(stepN);
  if(step){
    step.items.splice(idx, 1);
    const newState = {};
    Object.keys(state).forEach(k=>{
      const [sn, si] = k.split('-').map(Number);
      if(sn !== stepN){ newState[k] = state[k]; return; }
      if(si < idx){ newState[k] = state[k]; }
      else if(si > idx){ newState[`${sn}-${si-1}`] = state[k]; }
    });
    state = newState;
  }
  pendingDelete = null;
  closeModal('delete-modal');
  renderAll();
  const b = document.getElementById('step-body-'+stepN);
  if(b) b.style.display='block';
}

// ── Replace ───────────────────────────────────────────────────────────────────
let pendingReplace = null;

function openReplaceModal(stepN, idx){
  const step = findStep(stepN);
  const text = step ? step.items[idx] : '';
  document.getElementById('replace-modal-old').textContent = `Current: "${text}"`;
  document.getElementById('replace-modal-input').value = '';
  pendingReplace = {stepN, idx};
  document.getElementById('replace-confirm-btn').onclick = confirmReplace;
  openModal('replace-modal');
  setTimeout(()=>document.getElementById('replace-modal-input').focus(), 80);
}

function confirmReplace(){
  if(!pendingReplace) return;
  const val = document.getElementById('replace-modal-input').value.trim();
  if(!val){ alert('Please enter replacement text.'); return; }
  const {stepN, idx} = pendingReplace;
  const step = findStep(stepN);
  if(step) step.items[idx] = val;
  pendingReplace = null;
  closeModal('replace-modal');
  renderAll();
  const b = document.getElementById('step-body-'+stepN);
  if(b) b.style.display='block';
}

document.getElementById('replace-modal-input').addEventListener('keydown', e=>{
  if(e.key==='Enter'){ e.preventDefault(); confirmReplace(); }
  if(e.key==='Escape'){ closeModal('replace-modal'); }
});

// ── Modal helpers ─────────────────────────────────────────────────────────────
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(o=>{
  o.addEventListener('click', e=>{ if(e.target===o) o.classList.remove('open'); });
});

// ── Utils ─────────────────────────────────────────────────────────────────────
function findStep(stepN){
  for(const ph of STEPS){
    const s = ph.steps.find(s=>s.n===stepN);
    if(s) return s;
  }
  return null;
}
function escHtml(str){
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(str){
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── Downloads ─────────────────────────────────────────────────────────────────
function downloadCSV(){
  if(!listingAddr) return;
  const rows = [['Week','Task','Status','Completed']];
  STEPS.forEach(ph=>{
    ph.steps.forEach(s=>{
      const weekDone = stepStatus[s.n]==='done';
      s.items.forEach((item,i)=>{
        const checked = state[s.n+'-'+i] ? 'Yes' : 'No';
        rows.push([ph.phaseLabel, `"${item.replace(/"/g,'""')}"`, weekDone?'Week Done':'In Progress', checked]);
      });
    });
  });
  const csv = rows.map(r=>r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = listingAddr.replace(/[^a-z0-9]/gi,'_')+'_marketing.csv';
  a.click();
}

function downloadPDF(){
  if(!listingAddr) return;
  const dom = getDaysOnMarket();
  const weekNum = getCurrentWeekNum();
  let allSteps=[];
  STEPS.forEach(ph=>ph.steps.forEach(s=>allSteps.push({...s,phaseLabel:ph.phaseLabel})));
  const totalDone = Object.values(stepStatus).filter(v=>v==='done').length;
  const totalChecked = Object.values(state).filter(Boolean).length;
  const totalItems = allSteps.reduce((sum,s)=>sum+s.items.length,0);

  const rows = STEPS.map(ph => ph.steps.map(s=>{
    const weekDone = stepStatus[s.n]==='done';
    const checkedCount = s.items.filter((_,i)=>state[s.n+'-'+i]).length;
    const itemRows = s.items.map((item,i)=>{
      const done = state[s.n+'-'+i];
      return `<tr style="background:${done?'#f0faf5':'#fff'}">
        <td style="padding:5px 10px;font-size:12px;color:${done?'#888':'#1a1a1a'};text-decoration:${done?'line-through':'none'}">${item}</td>
        <td style="padding:5px 10px;text-align:center;font-size:12px;color:${done?'#1D9E75':'#ccc'}">${done?'✓':'○'}</td>
      </tr>`;
    }).join('');
    return `<div style="margin-bottom:14px;page-break-inside:avoid">
      <div style="background:${weekDone?'#e8f5e9':'#f5f5f5'};border-radius:6px;padding:7px 12px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:13px;font-weight:600;color:#1a1a1a">${s.title}</span>
        <span style="font-size:11px;color:${weekDone?'#1D9E75':'#888'}">${weekDone?'✓ Week done':checkedCount+'/'+s.items.length+' tasks'}</span>
      </div>
      <table style="width:100%;border-collapse:collapse;border:1px solid #e0e0e0;border-radius:6px;overflow:hidden">
        ${itemRows}
      </table>
    </div>`;
  }).join('')).join('');

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>Marketing Report — ${listingAddr}</title>
  <style>
    body{font-family:-apple-system,sans-serif;color:#1a1a1a;padding:32px 40px;font-size:13px}
    h1{font-size:20px;font-weight:700;margin-bottom:4px}
    .sub{font-size:12px;color:#666;margin-bottom:20px}
    .stats{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}
    .stat{background:#f5f5f5;border-radius:8px;padding:10px 18px;text-align:center}
    .stat-n{font-size:22px;font-weight:700}
    .stat-l{font-size:10px;color:#888;margin-top:2px}
    @media print{@page{margin:15mm}}
  </style></head><body>
  <h1>📋 Listing Marketing Report</h1>
  <div class="sub">${listingAddr} · Listed ${listingDate.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})} · Generated ${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
  <div class="stats">
    <div class="stat"><div class="stat-n">${totalDone}</div><div class="stat-l">Weeks Done</div></div>
    <div class="stat"><div class="stat-n">${totalChecked}/${totalItems}</div><div class="stat-l">Tasks Checked</div></div>
    <div class="stat"><div class="stat-n">Day ${dom}</div><div class="stat-l">On Market</div></div>
    <div class="stat"><div class="stat-n">Week ${weekNum}</div><div class="stat-l">Current Week</div></div>
  </div>
  ${rows}
  <script>window.onload=()=>window.print()<\/script>
  </body></html>`;

  const win = window.open('','_blank');
  if(!win){ alert('Allow popups to download PDF'); return; }
  win.document.write(html);
  win.document.close();
}

renderSavedList();
